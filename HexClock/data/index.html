  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    #time {
      font-size: 2em;
      margin-bottom: 20px;
    }
    button {
      font-size: 1em;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
  <script>
    // Auto-refresh every second
    setInterval(() => {
      fetch('/current_time')
        .then(response => response.text())
        .then(time => document.getElementById('time').innerText = time);
    }, 1000);
  </script>

  <div id="time">%CURRENT_TIME%</div>
  <button onclick="window.location.href='/cfg'">Go to Configuration</button>
